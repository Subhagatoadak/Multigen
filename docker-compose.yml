version: '3.8'

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 10

  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-db:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "temporal"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      temporal-db:
        condition: service_healthy
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    # No healthcheck — the auto-setup image runs DB migrations before
    # binding port 7233, and none of the standard check tools (nc, curl)
    # are available in the Alpine base image. Downstream services use
    # restart: unless-stopped to retry until Temporal is ready.
    restart: on-failure

  temporal-ui:
    image: temporalio/ui:2.26.2
    depends_on:
      - temporal
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    restart: on-failure

  # ─── Multigen Services ─────────────────────────────────────────────────────

  capability-service:
    build:
      context: .
      dockerfile: Dockerfile.capability
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - CAPABILITY_DB_NAME=multigen
      - CAPABILITY_COLLECTION_NAME=capabilities
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BROKER_URL=kafka:29092
      - TEMPORAL_SERVER_URL=temporal:7233
      - MONGODB_URI=mongodb://mongodb:27017
      - CAPABILITY_SERVICE_URL=http://capability-service:8001
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      capability-service:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Kafka consumer: reads flow-requests and triggers Temporal workflows
  flow-worker:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: python -m orchestrator.services.flow_messaging
    environment:
      - KAFKA_BROKER_URL=kafka:29092
      - TEMPORAL_SERVER_URL=temporal:7233
      - METRICS_PORT=8001
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      temporal:
        condition: service_started
    restart: unless-stopped

  # Temporal worker: registers and executes ComplexSequenceWorkflow + agent_activity
  temporal-worker:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    command: python -m workers.temporal_worker
    environment:
      - TEMPORAL_SERVER_URL=temporal:7233
    env_file:
      - .env
    depends_on:
      temporal:
        condition: service_started
    restart: unless-stopped

  # ─── Agentic Simulator ─────────────────────────────────────────────────────

  backend:
    build:
      context: ./agentic-simulator/backend
      dockerfile: Dockerfile
    container_name: agentic-backend
    ports:
      - "8003:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  simulator-frontend:
    build:
      context: ./agentic-simulator/frontend
      dockerfile: Dockerfile
    container_name: agentic-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongodb_data:
  temporal_db_data:
